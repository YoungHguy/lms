{% extends 'registration/registration_base.html' %}
{% load i18n %}
{% block title %}密码重置 | 学习管理系统{% endblock title %}
{% load crispy_forms_tags %}
{% block content %}
<div id="login">
  <h3 class="login-title">密码重置</h3>

  <form action="" method="POST" class="form-box">{% csrf_token %}
    <div class="container">
      <!-- {{ form|crispy }} -->
    <div class="form-group">
      <i class="fas fa-envelope"></i>邮箱 {{ form.email }}
      <span class="danger">{{ form.email.errors }}</span>
    </div>
    </div>
    <button type="submit" class="btn btn-primary"><small>请求密码重置</small></button>
  </form>
</div>
{% endblock content %}
