{% extends 'base.html' %}
{% load i18n %}
{% block title %}{{ title }} | 学习管理系统{% endblock title %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}

<nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">首页</a></li>
        <li class="breadcrumb-item active" aria-current="page">密码修改</li>
    </ol>
</nav>

{% include 'snippets/messages.html' %}

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <p class="form-title"><i class="fas fa-lock"></i>修改密码</p>
            <div class="card-body">
                <form action="" method="POST">{% csrf_token %}
                {{ form|crispy }}
                <center><input class="btn btn-primary" type="submit" value="修改密码"></center><br>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
